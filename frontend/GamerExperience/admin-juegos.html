<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Juegos</title>
    <link rel="stylesheet" href="assets/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
</head>
<body class="bg-[#131212]">
    <div id="" class="fixed inset-0 w-full h-full z-50 pointer-events-none object-cover">
        <img src="./assets/images/bezel.png" alt="" class="absolute inset-0 w-full h-full object-cover lg:object-fill md:object-fill sm:object-cover  object-center pointer-events-none">
    </div>  
    <header class="flex bg-[#0e0d0d] items-center justify-between w-full h-28 pl-20 pt-12 sticky">
        <div class="flex items-center">
            <img src="./assets/images/user-logo.png" class="w-12 h-12 mr-4 select-none" draggable="false">
            <span class="font-pixel text-amber-50 text-xl select-none">
                ADMIN
            </span>
        </div>
        <div class="pr-18">
            <a href="home.html" class="text-amber-100 font-pixel font-bold text-xl">
                Pagina Principal
            </a>
        </div>
    </header>
    <form action="" class="mt-18 mb-18 mx-auto max-w-xl bg-[#1a1919] p-8 rounded-lg shadow-lg flex flex-col gap-6 font-pixel text-amber-50">
        <!-- Sección nombre del juego -->
        <div class="flex flex-col gap-2">
            <label for="game-name" class="text-lg">Nombre del Juego</label>
            <input type="text" id="game-name" name="game-name" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <!-- Sección año de lanzamiento -->
        <div class="flex flex-col gap-2">
            <label for="game-year" class="text-lg">Año de lanzamiento</label>
            <input type="number" id="game-year" name="game-year" min="1950" max="2025" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <!-- Sección descripción -->
        <div class="flex flex-col gap-2">
            <label for="game-desc" class="text-lg">Descripción</label>
            <textarea id="game-desc" name="game-desc" rows="3" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required></textarea>
        </div>
        <!-- Sección desarrolladora -->
        <div class="flex flex-col gap-2">
            <label for="game-dev" class="text-lg">Desarrolladora</label>
            <select id="game-dev" name="game-dev" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
            <option value="" disabled selected>Selecciona una desarrolladora</option>
            <!-- Opciones agregadas dinámicamente por API -->
            </select>
        </div>
        <!-- Sección plataforma -->
        <div class="flex flex-col gap-2">
            <label for="game-platform" class="text-lg">Plataforma</label>
            <select id="game-platform" name="game-platform" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
            <option value="" disabled selected>Selecciona una plataforma</option>
            <!-- Opciones agregadas dinámicamente por API -->
            </select>
        </div>
        <!-- Sección genero -->
        <div class="flex flex-col gap-2">
            <label for="game-genero" class="text-lg">Género</label>
            <select id="game-genero" name="game-genero" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
            <option value="" disabled selected>Selecciona un género</option>
            <option value="accion">Acción</option>
            <option value="aventura">Aventura</option>
            <option value="rpg">RPG</option>
            <option value="estrategia">Estrategia</option>
            <option value="deportes">Deportes</option>
            <option value="simulacion">Simulación</option>
            <option value="puzzle">Puzzle</option>
            <option value="carreras">Carreras</option>
            <option value="plataformas">Plataformas</option>
            <option value="otro">Otro</option>
            </select>
        </div>
        <!-- Sección URL de la portada -->
        <div class="flex flex-col gap-2">
            <label for="game-cover" class="text-lg">URL de la portada</label>
            <input type="url" id="game-cover" name="game-cover" placeholder="https://ejemplo.com/portada.png" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <button type="submit" class="mt-4 bg-amber-500 hover:bg-amber-600 text-lg text-[#131212] font-bold py-2 px-6 rounded transition">Guardar</button>
        </form>
        <script>
        // Ejemplo de cómo poblar los selects desde la API
        async function populateSelect(url, selectId, textKey = 'nombre', valueKey = 'id') {
            try {
            const response = await fetch(url);
            const data = await response.json();
            const select = document.getElementById(selectId);
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item[valueKey];
                option.textContent = item[textKey];
                select.appendChild(option);
            });
            } catch (error) {
            console.error('Error al cargar opciones:', error);
            }
        }

        // Reemplaza las URLs con las de tu API real
        populateSelect('/api/desarrolladoras', 'game-dev');
        populateSelect('/api/plataformas', 'game-platform');
        </script>

    <div id="static-effect" class="fixed inset-0 w-full h-full pointer-events-none" style="background: url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif') center center / cover repeat; opacity: 0.01; mix-blend-mode: lighten;"></div>
</body>
</html>
