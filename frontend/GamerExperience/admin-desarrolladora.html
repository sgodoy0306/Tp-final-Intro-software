<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Desarrolladora</title>
    <link rel="stylesheet" href="assets/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
</head>
<body class="bg-[#131212]">
    <div id="" class="fixed inset-0 w-full h-full z-50 pointer-events-none object-cover">
        <img src="./assets/images/bezel.png" alt="" class="absolute inset-0 w-full h-full object-cover lg:object-fill md:object-fill sm:object-cover  object-center pointer-events-none">
    </div>  
    <header class="flex bg-[#0e0d0d] items-center justify-between w-full h-28 pl-20 pt-12">
        <div class="flex items-center">
            <img src="./assets/images/user-logo.png" class="w-12 h-12 mr-4 select-none" draggable="false">
            <span class="font-pixel text-amber-50 text-xl select-none">
                ADMIN
            </span>
        </div>
        <div class="pr-18">
            <a href="home.html" class="text-amber-100 font-pixel font-bold text-xl">
                Pagina Principal
            </a>
        </div>
    </header>
    <form action="" class="mt-18 mb-18 mx-auto max-w-xl bg-[#1a1919] p-8 rounded-lg shadow-lg flex flex-col gap-6 font-pixel text-amber-50">
        <!-- Sección nombre de la desarrolladora -->
        <div class="flex flex-col gap-2">
            <label for="dev-name" class="text-lg">Nombre de la Desarrolladora</label>
            <input type="text" id="dev-name" name="dev-name" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <!-- Sección año de fundación -->
        <div class="flex flex-col gap-2">
            <label for="dev-year" class="text-lg">Año de Fundación</label>
            <input type="number" id="dev-year" name="dev-year" min="1950" max="2025" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <!-- Sección país -->
        <div class="flex flex-col gap-2">
            <label for="dev-country" class="text-lg">País</label>
            <input type="text" id="dev-country" name="dev-country" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required>
        </div>
        <!-- Sección descripción -->
        <div class="flex flex-col gap-2">
            <label for="dev-desc" class="text-lg">Descripción</label>
            <textarea id="dev-desc" name="dev-desc" rows="3" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none" required></textarea>
        </div>
        <!-- Sección logo -->
        <div class="flex flex-col gap-2">
            <label for="dev-logo" class="text-lg">URL del Logo</label>
            <input type="url" id="dev-logo" name="dev-logo" placeholder="https://ejemplo.com/logo.png" class="bg-[#232222] border border-[#333] rounded px-4 py-2 text-amber-50 focus:outline-none">
        </div>
        <button type="submit" class="mt-4 bg-amber-500 hover:bg-amber-600 text-lg text-[#131212] font-bold py-2 px-6 rounded transition">Guardar</button>
    </form>


    

    <div id="static-effect" class="fixed inset-0 w-full h-full pointer-events-none" style="background: url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif') center center / cover repeat; opacity: 0.01; mix-blend-mode: lighten;"></div>
</body>
</html>
