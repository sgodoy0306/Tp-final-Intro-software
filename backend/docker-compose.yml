# Usar docker compose up para correr esto

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: db_juegos
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/db.sql:/docker-entrypoint-initdb.d/db.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
